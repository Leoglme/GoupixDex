name: Desktop build & release (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/desktop-release.yml'
  workflow_dispatch:

concurrency:
  group: goupixdex-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    # Évite l’avertissement « actions JS sur Node 20 » (passage Node 24 côté runner GitHub).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: startsWith(matrix.platform, 'macos')
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_GITHUB_REPO: ${{ github.repository }}
        with:
          projectPath: web
          tagName: desktop
          releaseName: "GoupixDex Desktop"
          releaseBody: |
            Build **production** Windows / macOS (Rust `--release`, pas de console cmd au lancement sur Windows).

            Installeurs : voir les assets ci-dessous (.exe, .msi, .dmg).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
