name: Desktop build & release (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/desktop-release.yml'
  workflow_dispatch:

concurrency:
  group: goupixdex-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          NUXT_PUBLIC_GITHUB_REPO: ${{ github.repository }}
        with:
          projectPath: web
          tagName: desktop-nightly
          releaseName: "Desktop nightly"
          releaseBody: "Build automatique Windows/macOS de GoupixDex Desktop."
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
